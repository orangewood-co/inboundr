name: Embed CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "embed/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/embed-deploy.yml"
  push:
    branches:
      - main
    paths:
      - "embed/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/embed-deploy.yml"

concurrency:
  group: embed-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck embed
        run: bun run typecheck:embed

      - name: Build embed
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
        run: bun run build:embed

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: embed-dist
          path: embed/dist
          if-no-files-found: error

  deploy:
    name: Deploy embed to S3
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: embed-dist
          path: embed/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload hashed assets
        run: |
          aws s3 sync embed/dist "s3://${{ vars.EMBED_S3_BUCKET }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload app shell
        run: |
          aws s3 cp embed/dist/index.html "s3://${{ vars.EMBED_S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.EMBED_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
