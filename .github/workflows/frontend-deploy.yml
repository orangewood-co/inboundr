name: Frontend CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/frontend-deploy.yml"
      - "docs/deployment/s3-cloudfront-frontend.md"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/frontend-deploy.yml"
      - "docs/deployment/s3-cloudfront-frontend.md"

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck frontend
        run: bun run typecheck:frontend

      - name: Build frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_EMBED_URL: ${{ vars.VITE_EMBED_URL }}
          VITE_POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_POSTHOG_PROJECT_TOKEN }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
        run: bun run build:frontend

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  deploy:
    name: Deploy frontend to S3
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload hashed assets
        run: |
          aws s3 sync frontend/dist "s3://${{ vars.FRONTEND_S3_BUCKET }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload app shell
        run: |
          aws s3 cp frontend/dist/index.html "s3://${{ vars.FRONTEND_S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
