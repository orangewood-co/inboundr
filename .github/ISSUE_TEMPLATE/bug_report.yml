name: Bug report
description: Report reproducible bugs, regressions, or broken behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Clear details help us reproduce and fix issues faster.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of Inboundr is affected?
      options:
        - Backend
        - Frontend
        - Landing
        - Embed
        - Docs
        - Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe what is broken.
      placeholder: "Example: The quote generation flow fails after uploading an RFQ PDF."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Run ...
        4. See error ...
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Relevant package
      description: If known, choose the workspace package most related to the bug.
      options:
        - backend
        - frontend
        - landing
        - embed
        - root/workspace
        - not sure
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser
      description: For UI issues, include browser name and version.
      placeholder: Chrome 125, Safari 18, Firefox 126
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      description: Include OS and version if relevant.
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: false

  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: If this happened locally, include the Bun version.
      placeholder: bun --version
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or traces
      description: Paste relevant logs or attach screenshots. Please remove secrets, tokens, and customer data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context that may help us diagnose the issue.
    validations:
      required: false
