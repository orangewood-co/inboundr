<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inboundr turns inbound RFQ emails into quotes, invoices, and orders — one workspace for your whole sales pipeline." />
    <meta name="theme-color" content="#0c1214" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <title>Inboundr</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var b = JSON.parse(localStorage.getItem("organization-branding"));
          if (b && b.primaryColor) {
            // Mirrors hexToOklch in src/lib/organization-branding.tsx so the
            // first paint matches the theme tokens' oklch color space.
            var toOklch = function (hex) {
              var lin = function (v) {
                v /= 255;
                return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
              };
              var r = lin(parseInt(hex.slice(1, 3), 16));
              var g = lin(parseInt(hex.slice(3, 5), 16));
              var bl = lin(parseInt(hex.slice(5, 7), 16));
              var l = Math.cbrt(0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * bl);
              var m = Math.cbrt(0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * bl);
              var s2 = Math.cbrt(0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * bl);
              var L = 0.2104542553 * l + 0.793617785 * m - 0.0040720468 * s2;
              var a = 1.9779984951 * l - 2.428592205 * m + 0.4505937099 * s2;
              var b2 = 0.0259040371 * l + 0.7827717662 * m - 0.808675766 * s2;
              var C = Math.sqrt(a * a + b2 * b2);
              var H = (Math.atan2(b2, a) * 180) / Math.PI;
              if (H < 0) H += 360;
              return "oklch(" + L.toFixed(4) + " " + C.toFixed(4) + " " + H.toFixed(2) + ")";
            };
            var s = document.documentElement.style;
            var c = b.primaryColor;
            var primary = toOklch(c);
            var vars = ["--primary", "--sidebar-primary", "--chart-1", "--chart-2", "--ring"];
            for (var i = 0; i < vars.length; i++) s.setProperty(vars[i], primary);
            var r = parseInt(c.slice(1, 3), 16);
            var g = parseInt(c.slice(3, 5), 16);
            var bl = parseInt(c.slice(5, 7), 16);
            var fg = (0.2126 * r + 0.7152 * g + 0.0722 * bl) / 255 > 0.58 ? "#1f1600" : "#ffffff";
            s.setProperty("--primary-foreground", toOklch(fg));
            s.setProperty("--sidebar-primary-foreground", toOklch(fg));
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
