<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inboundr</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var b = JSON.parse(localStorage.getItem("organization-branding"));
          if (b && b.primaryColor) {
            var s = document.documentElement.style;
            var c = b.primaryColor;
            var vars = ["--primary", "--sidebar-primary", "--chart-1", "--chart-2", "--ring"];
            for (var i = 0; i < vars.length; i++) s.setProperty(vars[i], c);
            var r = parseInt(c.slice(1, 3), 16);
            var g = parseInt(c.slice(3, 5), 16);
            var bl = parseInt(c.slice(5, 7), 16);
            var fg = (0.2126 * r + 0.7152 * g + 0.0722 * bl) / 255 > 0.58 ? "#1f1600" : "#ffffff";
            s.setProperty("--primary-foreground", fg);
            s.setProperty("--sidebar-primary-foreground", fg);
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
